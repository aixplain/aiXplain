<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 690" width="1200" height="690"
     font-family="'Geist','TT Norms Pro',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif">
  <defs>
    <linearGradient id="axOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF7302"/>
      <stop offset="1" stop-color="#FFA90E"/>
    </linearGradient>
    <radialGradient id="axGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FF7302" stop-opacity="0.20"/>
      <stop offset="0.55" stop-color="#FFA90E" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#FFA90E" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrGray" markerWidth="9" markerHeight="9" refX="7" refY="3.2" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0 L7 3.2 L0 6.4" fill="none" stroke="#818181" stroke-width="1.4"/>
    </marker>
    <marker id="arrOrange" markerWidth="9" markerHeight="9" refX="7" refY="3.2" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0 L7 3.2 L0 6.4" fill="none" stroke="#FF7302" stroke-width="1.6"/>
    </marker>
  </defs>

  <!-- panel (carries its own background so it reads in GitHub light + dark) -->
  <rect x="0.5" y="0.5" width="1199" height="689" rx="22" fill="#FFFFFF" stroke="#090909" stroke-opacity="0.10"/>

  <!-- header -->
  <text x="60" y="56" font-family="'JetBrains Mono',ui-monospace,Menlo,monospace" font-size="12" letter-spacing="2.5" fill="#818181">ARCHITECTURE</text>
  <text x="60" y="90" font-size="30" font-weight="700" fill="#090909" letter-spacing="-0.5">aixplain Agentic OS</text>
  <!-- control axes: on your terms -->
  <g font-size="13">
    <rect x="60"  y="106" width="104" height="32" rx="16" fill="#F8F8F8" stroke="#090909" stroke-opacity="0.12"/>
    <text x="80"  y="127"><tspan fill="#818181">your </tspan><tspan fill="#090909" font-weight="600">data</tspan></text>
    <rect x="176" y="106" width="100" height="32" rx="16" fill="#F8F8F8" stroke="#090909" stroke-opacity="0.12"/>
    <text x="196" y="127"><tspan fill="#818181">your </tspan><tspan fill="#090909" font-weight="600">cost</tspan></text>
    <rect x="288" y="106" width="170" height="32" rx="16" fill="#F8F8F8" stroke="#090909" stroke-opacity="0.12"/>
    <text x="308" y="127"><tspan fill="#818181">your </tspan><tspan fill="#090909" font-weight="600">independence</tspan></text>
  </g>

  <!-- glow behind the hero loop -->
  <ellipse cx="620" cy="282" rx="470" ry="150" fill="url(#axGlow)"/>

  <!-- ===== entry ===== -->
  <rect x="40" y="256" width="118" height="52" rx="12" fill="#F8F8F8" stroke="#090909" stroke-opacity="0.12"/>
  <text x="99" y="277" text-anchor="middle" font-size="11.5" fill="#364049">SDK · Studio</text>
  <text x="99" y="294" text-anchor="middle" font-size="11.5" fill="#364049">CLI · MCP</text>

  <circle cx="196" cy="282" r="20" fill="#FFFFFF" stroke="#090909" stroke-opacity="0.2"/>
  <path d="M189 281 v-3 a7 7 0 0 1 14 0 v3 M186 281 h20 v13 h-20 z" fill="none" stroke="#090909" stroke-opacity="0.55" stroke-width="1.4" stroke-linejoin="round"/>
  <text x="196" y="322" text-anchor="middle" font-family="'JetBrains Mono',ui-monospace,Menlo,monospace" font-size="9.5" letter-spacing="1" fill="#818181">AUTH</text>

  <line x1="158" y1="282" x2="174" y2="282" stroke="#818181" stroke-width="1.5" marker-end="url(#arrGray)"/>
  <line x1="218" y1="282" x2="236" y2="282" stroke="#818181" stroke-width="1.5" marker-end="url(#arrGray)"/>

  <!-- ===== HERO: governed execution loop (the one orange focal) ===== -->
  <rect x="240" y="206" width="762" height="150" rx="18" fill="#FFFFFF" stroke="url(#axOrange)" stroke-width="1.6"/>
  <text x="260" y="232" font-family="'JetBrains Mono',ui-monospace,Menlo,monospace" font-size="11" letter-spacing="1.5" fill="#FF7302">EXECUTION LOOP · governed on every action</text>

  <!-- nodes (y 257–305, center 281) -->
  <!-- Goal -->
  <rect x="270" y="257" width="66" height="48" rx="11" fill="#FFFFFF" stroke="#090909" stroke-opacity="0.14"/>
  <text x="303" y="285" text-anchor="middle" font-size="13" fill="#090909">Goal</text>
  <!-- Planner -->
  <rect x="352" y="257" width="92" height="48" rx="11" fill="#FFFFFF" stroke="#090909" stroke-opacity="0.14"/>
  <text x="398" y="285" text-anchor="middle" font-size="13" fill="#090909">Planner</text>
  <!-- Orchestrator -->
  <rect x="460" y="257" width="118" height="48" rx="11" fill="#FFFFFF" stroke="#090909" stroke-opacity="0.14"/>
  <text x="519" y="285" text-anchor="middle" font-size="13" fill="#090909">Orchestrator</text>
  <!-- Gate: Inspector · Bodyguard (ORANGE focal) -->
  <rect x="594" y="251" width="180" height="60" rx="12" fill="url(#axOrange)"/>
  <text x="684" y="276" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">Inspector · Bodyguard</text>
  <text x="684" y="294" text-anchor="middle" font-size="10.5" fill="#FFFFFF" fill-opacity="0.92">validate · authorize</text>
  <!-- Action -->
  <rect x="790" y="257" width="82" height="48" rx="11" fill="#FFFFFF" stroke="#090909" stroke-opacity="0.14"/>
  <text x="831" y="285" text-anchor="middle" font-size="13" fill="#090909">Action</text>
  <!-- Result -->
  <rect x="888" y="257" width="84" height="48" rx="11" fill="#FFFFFF" stroke="#090909" stroke-opacity="0.14"/>
  <text x="930" y="285" text-anchor="middle" font-size="13" fill="#090909">Result</text>

  <!-- orange flow arrows -->
  <line x1="336" y1="281" x2="350" y2="281" stroke="#FF7302" stroke-width="1.7" marker-end="url(#arrOrange)"/>
  <line x1="444" y1="281" x2="458" y2="281" stroke="#FF7302" stroke-width="1.7" marker-end="url(#arrOrange)"/>
  <line x1="578" y1="281" x2="592" y2="281" stroke="#FF7302" stroke-width="1.7" marker-end="url(#arrOrange)"/>
  <line x1="774" y1="281" x2="788" y2="281" stroke="#FF7302" stroke-width="1.7" marker-end="url(#arrOrange)"/>
  <line x1="872" y1="281" x2="886" y2="281" stroke="#FF7302" stroke-width="1.7" marker-end="url(#arrOrange)"/>

  <!-- replan-on-failure return -->
  <path d="M930 305 C930 332, 700 336, 460 336 C430 336, 400 336, 398 307"
        fill="none" stroke="#818181" stroke-width="1.4" stroke-dasharray="4 4" marker-end="url(#arrGray)"/>
  <text x="600" y="332" text-anchor="middle" font-family="'JetBrains Mono',ui-monospace,Menlo,monospace" font-size="9.5" letter-spacing="0.5" fill="#818181">replan on failure</text>

  <!-- exit -->
  <line x1="1002" y1="281" x2="1020" y2="281" stroke="#818181" stroke-width="1.5" marker-end="url(#arrGray)"/>
  <rect x="1022" y="256" width="138" height="52" rx="12" fill="#F8F8F8" stroke="#090909" stroke-opacity="0.12"/>
  <text x="1091" y="286" text-anchor="middle" font-size="12.5" fill="#364049">Apps · Clients</text>

  <!-- Evolver feedback (improves agents from production) -->
  <path d="M700 426 C760 392, 820 372, 845 312" fill="none" stroke="#818181" stroke-width="1.3" stroke-dasharray="4 4" marker-end="url(#arrGray)"/>
  <text x="1140" y="388" text-anchor="end" font-size="12" fill="#818181"><tspan font-weight="600" fill="#364049">Evolver</tspan> — improves agents from production</text>

  <!-- ===== kernel services ===== -->
  <text x="60" y="404" font-family="'JetBrains Mono',ui-monospace,Menlo,monospace" font-size="11" letter-spacing="1.5" fill="#818181">RUNS ON THE KERNEL</text>

  <!-- 6 cards: x 60,240,420,600,780,960 ; w 165 ; y 418 h 80 -->
  <g font-size="9.5">
    <rect x="60"  y="418" width="165" height="80" rx="13" fill="#FFFFFF" stroke="#090909" stroke-opacity="0.12"/>
    <text x="76"  y="452" font-size="14" font-weight="600" fill="#090909">Agent Engine</text>
    <text x="76"  y="473" fill="#818181">execution + system agents</text>

    <rect x="240" y="418" width="165" height="80" rx="13" fill="#FFFFFF" stroke="#090909" stroke-opacity="0.12"/>
    <text x="256" y="452" font-size="14" font-weight="600" fill="#090909">Asset Serving</text>
    <text x="256" y="473" fill="#818181">models, tools, router</text>

    <rect x="420" y="418" width="165" height="80" rx="13" fill="#FFFFFF" stroke="#090909" stroke-opacity="0.12"/>
    <text x="436" y="452" font-size="14" font-weight="600" fill="#090909">aiR</text>
    <text x="436" y="473" fill="#818181">knowledge + memory</text>

    <rect x="600" y="418" width="165" height="80" rx="13" fill="#FFFFFF" stroke="#090909" stroke-opacity="0.12"/>
    <text x="616" y="452" font-size="14" font-weight="600" fill="#090909">Observability</text>
    <text x="616" y="473" fill="#818181">traces, audit, monitor</text>

    <rect x="780" y="418" width="165" height="80" rx="13" fill="#FFFFFF" stroke="#090909" stroke-opacity="0.12"/>
    <text x="796" y="452" font-size="14" font-weight="600" fill="#090909">Deployment Engine</text>
    <text x="796" y="473" fill="#818181">provision + scale</text>

    <rect x="960" y="418" width="180" height="80" rx="13" fill="#FFFFFF" stroke="#090909" stroke-opacity="0.12"/>
    <text x="976" y="452" font-size="14" font-weight="600" fill="#090909">Workspace Engine</text>
    <text x="976" y="473" fill="#818181">auth, workspaces, billing</text>
  </g>

  <!-- marketplace + byo caption -->
  <text x="60" y="528" font-size="12.5" fill="#818181"><tspan font-weight="600" fill="#364049">Marketplace:</tspan> 900+ models, tools &amp; integrations  ·  bring your own models, data, code &amp; MCP (BYOM/BYOK)</text>

  <!-- ===== deployment band ===== -->
  <rect x="60" y="554" width="1080" height="74" rx="14" fill="#F8F8F8" stroke="#090909" stroke-opacity="0.08"/>
  <text x="84" y="584" font-family="'JetBrains Mono',ui-monospace,Menlo,monospace" font-size="11" letter-spacing="1.5" fill="#818181">DEPLOY ANYWHERE</text>
  <text x="84" y="606" font-size="12" fill="#818181">same runtime — data stays in your perimeter</text>

  <g font-size="13" fill="#090909">
    <rect x="470" y="571" width="120" height="40" rx="20" fill="#FFFFFF" stroke="#090909" stroke-opacity="0.14"/>
    <text x="530" y="596" text-anchor="middle">Cloud</text>
    <rect x="602" y="571" width="130" height="40" rx="20" fill="#FFFFFF" stroke="#090909" stroke-opacity="0.14"/>
    <text x="667" y="596" text-anchor="middle">On-Prem</text>
    <rect x="744" y="571" width="110" height="40" rx="20" fill="#FFFFFF" stroke="#090909" stroke-opacity="0.14"/>
    <text x="799" y="596" text-anchor="middle">Edge</text>
    <rect x="866" y="571" width="150" height="40" rx="20" fill="#FFFFFF" stroke="#090909" stroke-opacity="0.14"/>
    <text x="941" y="596" text-anchor="middle">Air-gapped</text>
  </g>
</svg>
